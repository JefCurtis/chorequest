[env:esp32-cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    lvgl/lvgl@^9.2.0

build_flags =
    ; Display driver
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320

    ; TFT SPI pins
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1

    ; Backlight
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH

    ; Fonts
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1

    ; SPI frequency
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000

    ; LVGL uses lv_conf.h
    -DLV_CONF_INCLUDE_SIMPLE=1
    -Iinclude
